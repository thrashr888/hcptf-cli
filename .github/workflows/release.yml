name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.x'

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  homebrew:
    needs: goreleaser
    runs-on: ubuntu-latest
    steps:
      - name: Download SHA256SUMS
        id: sha
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          VERSION="${TAG_NAME#v}"
          curl -sL "https://github.com/thrashr888/hcptf-cli/releases/download/${TAG_NAME}/hcptf-cli_${VERSION}_SHA256SUMS" -o SHA256SUMS
          echo "darwin_arm64=$(grep darwin_arm64 SHA256SUMS | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "darwin_amd64=$(grep darwin_amd64 SHA256SUMS | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "linux_arm64=$(grep linux_arm64 SHA256SUMS | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "linux_amd64=$(grep linux_amd64 SHA256SUMS | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
      - name: Update Homebrew formula
        uses: thrashr888/homebrew-tap@main
        with:
          formula: hcptf
          tag: ${{ github.ref_name }}
          tap-token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          darwin-arm64-sha256: ${{ steps.sha.outputs.darwin_arm64 }}
          darwin-amd64-sha256: ${{ steps.sha.outputs.darwin_amd64 }}
          linux-arm64-sha256: ${{ steps.sha.outputs.linux_arm64 }}
          linux-amd64-sha256: ${{ steps.sha.outputs.linux_amd64 }}
          template: |
            class Hcptf < Formula
              desc "CLI for HCP Terraform with full API coverage"
              homepage "https://github.com/thrashr888/hcptf-cli"
              version "${VERSION}"
              license "MIT"

              on_macos do
                on_arm do
                  url "https://github.com/thrashr888/hcptf-cli/releases/download/${TAG}/hcptf-cli_${VERSION}_darwin_arm64.tar.gz"
                  sha256 "${SHA_DARWIN_ARM64}"
                end
                on_intel do
                  url "https://github.com/thrashr888/hcptf-cli/releases/download/${TAG}/hcptf-cli_${VERSION}_darwin_amd64.tar.gz"
                  sha256 "${SHA_DARWIN_AMD64}"
                end
              end

              on_linux do
                on_arm do
                  url "https://github.com/thrashr888/hcptf-cli/releases/download/${TAG}/hcptf-cli_${VERSION}_linux_arm64.tar.gz"
                  sha256 "${SHA_LINUX_ARM64}"
                end
                on_intel do
                  url "https://github.com/thrashr888/hcptf-cli/releases/download/${TAG}/hcptf-cli_${VERSION}_linux_amd64.tar.gz"
                  sha256 "${SHA_LINUX_AMD64}"
                end
              end

              def install
                bin.install "hcptf"
              end

              test do
                assert_match "hcptf", shell_output("#{bin}/hcptf --help")
              end
            end
